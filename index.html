<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو زوم - ZOOM STUDIO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="menu-overlay" onclick="closeMenu()"></div>
    <div id="side-menu">
        <div class="menu-header">
            <img src="https://j.top4top.io/p_3716gls5g1.jpg" class="logo-img-small" alt="Zoom Studio Logo">
            <h2 class="menu-slogan">ZOOM STUDIO<br>#اختيارك_الأفضل</h2>
        </div>
        <div class="menu-buttons">
            <button class="btn-rounded" onclick="showPage('page-home')">الرئيسية</button>
            <button class="btn-rounded" onclick="showPage('page-new-booking')">حجز جديد</button>
            <button class="btn-rounded">الفرز</button>
            <button class="btn-rounded">تعديلات</button>
            <button class="btn-rounded">الحسابات</button>
        </div>
    </div>

    <div id="page-home" class="page active bg-black">
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        
        <div class="logo-container">
            <img src="https://j.top4top.io/p_3716gls5g1.jpg" class="logo-img-large" alt="Zoom Studio Logo">
            <h1 class="logo-text">ZOOM STUDIO</h1>
            <p class="slogan">#اختيارك_الأفضل</p>
        </div>

        <div class="home-buttons">
            <button class="btn-dashed" onclick="showPage('page-new-booking')">حجز جديد</button>
            <button class="btn-dashed" onclick="showPage('page-search-booking')">البحث عن حجز</button>
            <button class="btn-dashed">التفاصيل</button>
        </div>
    </div>

    <div id="page-new-booking" class="page hidden bg-white">
        <div class="form-container">
            <button class="btn-rounded title-btn">الحجز</button>
            <input type="text" placeholder="اسماء العرسان" class="input-rounded text-center">
            <input type="text" placeholder="التاريخ" class="input-rounded text-center">
            <input type="text" placeholder="نوع العرض" class="input-rounded text-center">
            <input type="text" placeholder="المبلغ الكلي" class="input-rounded text-center">
            <input type="text" placeholder="الواصل" class="input-rounded text-center">
            <input type="text" placeholder="الباقي" class="input-rounded text-center">
            <input type="text" placeholder="الملاحظات" class="input-rounded text-center">
        </div>
    </div>

    <div id="page-search-booking" class="page hidden bg-white">
        <div class="form-container">
            <button class="btn-rounded title-btn">البحث عن حجز</button>
            <input type="text" placeholder="اسماء العرسان" class="input-rounded text-center">
            <input type="text" placeholder="التاريخ" class="input-rounded text-center">
            <input type="text" placeholder="نوع العرض" class="input-rounded text-center">
            <input type="text" placeholder="طباعة فلاش" class="input-rounded text-center">
            <input type="text" placeholder="تسليم الفلاش" class="input-rounded text-center">
            <input type="text" placeholder="استلام الصور" class="input-rounded text-center">
            <input type="text" placeholder="طباعة الصور" class="input-rounded text-center">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
