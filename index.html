<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو زوم - ZOOM STUDIO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="menu-overlay" onclick="closeMenu()"></div>
    <div id="side-menu">
        <div class="menu-header">
            <img src="https://j.top4top.io/p_3716gls5g1.jpg" class="logo-img-small" alt="Zoom Studio Logo">
            <h2 class="menu-slogan">ZOOM STUDIO<br>#اختيارك_الأفضل</h2>
        </div>
        <div class="menu-buttons">
            <button class="btn-rounded" onclick="showPage('page-home')">الرئيسية</button>
            <button class="btn-rounded" onclick="showPage('page-six-bookings')">حجز جديد</button>
            <button class="btn-rounded">الفرز</button>
            <button class="btn-rounded">تعديلات</button>
            <button class="btn-rounded">الحسابات</button>
        </div>
    </div>

    <div id="page-home" class="page active bg-black">
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        
        <div class="logo-container">
            <img src="https://j.top4top.io/p_3716gls5g1.jpg" class="logo-img-large" alt="Zoom Studio Logo">
            <p class="slogan">#اختيارك_الأفضل</p>
        </div>

        <div class="home-buttons">
            <button class="btn-dashed" onclick="showPage('page-new-booking')">حجز جديد</button>
            <button class="btn-dashed" onclick="showPage('page-search-booking')">البحث عن حجز</button>
            <button class="btn-dashed">التفاصيل</button>
        </div>
    </div>

    <div id="page-six-bookings" class="page hidden bg-white">
        <div class="form-container">
            <button class="btn-rounded title-btn">التاريخ</button>
            <div class="boxes-grid">
                <div class="booking-box" onclick="openBookingBox(1)">الحجز 1</div>
                <div class="booking-box" onclick="openBookingBox(2)">الحجز 2</div>
                <div class="booking-box" onclick="openBookingBox(3)">الحجز 3</div>
                <div class="booking-box" onclick="openBookingBox(4)">الحجز 4</div>
                <div class="booking-box" onclick="openBookingBox(5)">الحجز 5</div>
                <div class="booking-box" onclick="openBookingBox(6)">الحجز 6</div>
            </div>
            <button class="btn-rounded" onclick="showPage('page-home')" style="margin-top: 10px;">رجوع</button>
        </div>
    </div>

    <div id="page-new-booking" class="page hidden bg-white">
        <div class="form-container">
            <button class="btn-rounded title-btn">الحجز</button>
            <input type="text" id="new-name" placeholder="اسماء العرسان" class="input-rounded text-center">
            <input type="date" id="new-date" placeholder="التاريخ" class="input-rounded text-center">
            <input type="text" id="new-offer" placeholder="نوع العرض" class="input-rounded text-center">
            <input type="text" id="new-total" placeholder="المبلغ الكلي" class="input-rounded text-center">
            <input type="text" id="new-paid" placeholder="الواصل" class="input-rounded text-center">
            <input type="text" id="new-rest" placeholder="الباقي" class="input-rounded text-center">
            <input type="text" id="new-notes" placeholder="الملاحظات" class="input-rounded text-center">
            <input type="text" id="new-photographer" placeholder="اسم المصور" class="input-rounded text-center">
            <button class="btn-rounded" style="background-color: #000; color: #fff; margin-top: 10px;" onclick="saveNewBooking()">حفظ الحجز</button>
            <button class="btn-rounded" onclick="showPage('page-home')">رجوع</button>
        </div>
    </div>

    <div id="page-search-booking" class="page hidden bg-white">
        <div class="form-container">
            <button class="btn-rounded title-btn">البحث عن حجز</button>
            <input type="text" id="search-name" placeholder="اسماء العرسان (للبحث)" class="input-rounded text-center" oninput="findBooking()">
            <input type="text" id="search-date" placeholder="التاريخ" class="input-rounded text-center" readonly>
            <input type="text" id="search-offer" placeholder="نوع العرض" class="input-rounded text-center" readonly>
            
            <div id="toggle-print-flash" class="input-rounded text-center status-toggle" onclick="toggleCheck('print-flash')">طباعة فلاش <span></span></div>
            <div id="toggle-receive-flash" class="input-rounded text-center status-toggle" onclick="toggleCheck('receive-flash')">تسليم الفلاش <span></span></div>
            <div id="toggle-receive-photos" class="input-rounded text-center status-toggle" onclick="toggleCheck('receive-photos')">استلام الصور <span></span></div>
            <div id="toggle-print-photos" class="input-rounded text-center status-toggle" onclick="toggleCheck('print-photos')">طباعة الصور <span></span></div>
            <button class="btn-rounded" onclick="showPage('page-home')" style="margin-top: 10px;">رجوع</button>
        </div>
    </div>

    <div id="page-bookings-list" class="page hidden bg-white">
        <div class="form-container" style="max-width: 90%; width: 100%;">
            <button class="btn-rounded title-btn">قائمة الحجوزات</button>
            <div id="bookings-list-container"></div>
            <button class="btn-rounded" onclick="showPage('page-home')" style="margin-top: 10px;">رجوع</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
