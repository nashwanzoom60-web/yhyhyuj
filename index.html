<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعار إغلاق المشروع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. الإعدادات الأساسية للصفحة
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            /* خلفية داكنة متدرجة تعطي طابعاً درامياً */
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير */
        }

        /* =========================================
           2. الحاوية الرئيسية للمحتوى
           ========================================= */
        .message-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05); /* خلفية شفافة قليلاً */
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            /* تطبيق حركة الظهور من الأسفل */
            animation: fadeInUp 1.5s ease-out forwards;
        }

        /* =========================================
           3. تصميم الأيقونة والنصوص
           ========================================= */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            /* تطبيق حركة النبض المستمرة */
            animation: pulse 2s infinite;
        }

        .title {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 15px;
            color: #e74c3c; /* لون أحمر يدل على الإغلاق/الخطر */
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .subtitle {
            font-size: 24px;
            font-weight: 400;
            color: #bdc3c7; /* لون رمادي فاتح */
            letter-spacing: 1px;
        }

        /* =========================================
           4. تعريف الحركات (Keyframes)
           ========================================= */
        
        /* حركة الظهور التدريجي من الأسفل */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* حركة النبض للأيقونة */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px rgba(255,255,255,0.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="message-container">
        <div class="icon">⛔</div>
        
        <h1 class="title">تم إغلاق المشروع</h1>
        <p class="subtitle">وحذف البيانات نهائياً</p>
    </div>

</body>
</html>
